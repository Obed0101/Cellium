name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to package
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build macOS installer
    runs-on: macos-15
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Build drag-to-Applications DMG
        env:
          ARCHS: arm64
          SIGNING_MODE: adhoc
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGN_IDENTITY: "-"
        run: ./Scripts/build-dmg.sh

      - name: Build updater ZIP
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' App/Info.plist)
          APP_PATH=".build/CelliumInstallerDerivedData/Build/Products/Release/Cellium.app"
          test -d "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_PATH" \
            "Distribution/Cellium-${VERSION}.zip"

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Cellium $RELEASE_TAG" \
              --generate-notes
          fi

      - name: Upload installer to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" Distribution/*.dmg Distribution/*.zip --repo "$GITHUB_REPOSITORY" --clobber
