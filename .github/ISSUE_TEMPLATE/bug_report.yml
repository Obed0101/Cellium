name: Bug report
description: Report a reproducible problem in Cellium.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Please remove private telemetry and machine-specific secrets before submitting.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the behavior you observed and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable reproduction.
      placeholder: |
        1. Open...
        2. Select...
        3. Observe...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Cellium version
      placeholder: e.g. 0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. macOS 15.5
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Mac hardware
      placeholder: e.g. Apple M-series MacBook Pro
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Remove identifiers, paths and private data before posting.
