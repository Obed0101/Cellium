name: Feature request
description: Suggest an improvement for Cellium.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user problem or limitation would this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches or workarounds have you tried?
  - type: checkboxes
    id: boundaries
    attributes:
      label: Product boundaries
      options:
        - label: This request does not require hidden data collection or a cloud account.
        - label: I understand that new privileges, automation or network access require explicit review.
